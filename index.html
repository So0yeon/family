<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌺 퍼스널 효도 테스트 🌺</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Gaegu:wght@400;700&display=swap');

  :root {
    --yellow: #FFD93D;
    --orange: #FF6B35;
    --pink: #FF8FA3;
    --purple: #C77DFF;
    --mint: #52E3C2;
    --navy: #1A1A2E;
    --card-bg: rgba(255,255,255,0.12);
    --text-light: #fff;
    --text-dark: #1A1A2E;
    --shadow: 0 8px 32px rgba(0,0,0,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    background: var(--navy);
    overflow-x: hidden;
    color: var(--text-light);
    transition: background 0.8s;
  }

  /* ===== STARS BACKGROUND ===== */
  .stars {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    overflow: hidden;
  }
  .star {
    position: absolute; border-radius: 50%;
    background: #fff; animation: twinkle var(--dur) infinite ease-in-out;
  }
  @keyframes twinkle {
    0%,100% { opacity: 0.15; transform: scale(1); }
    50% { opacity: 0.9; transform: scale(1.4); }
  }

  /* ===== CONFETTI ===== */
  .confetti-container {
    position: fixed; inset: 0; pointer-events: none; z-index: 999; overflow: hidden;
  }
  .confetti-piece {
    position: absolute; width: 10px; height: 10px; border-radius: 2px;
    animation: confettiFall var(--fall-dur) linear forwards;
  }
  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* ===== WRAPPER ===== */
  .wrapper {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 24px 16px;
  }

  /* ===== SCREEN ===== */
  .screen {
    display: none;
    width: 100%; max-width: 560px;
    animation: fadeSlideUp 0.5s ease forwards;
  }
  .screen.active { display: flex; flex-direction: column; gap: 20px; }
  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== HYODOBOT ===== */
  .heartbot {
    display: flex; align-items: center; gap: 12px;
    background: rgba(255,255,255,0.1);
    border: 1.5px solid rgba(255,255,255,0.2);
    border-radius: 20px; padding: 14px 18px;
    backdrop-filter: blur(10px);
  }
  .heartbot-face {
    font-size: 2rem; animation: bounce 1.5s infinite ease-in-out;
    flex-shrink: 0;
  }
  @keyframes bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .heartbot-text {
    font-size: 0.92rem; line-height: 1.55; color: #fff;
    font-weight: 500;
  }

  /* ===== TITLE ===== */
  .title-wrap { text-align: center; }
  .game-title {
    font-family: 'Gaegu', cursive;
    font-size: clamp(1.8rem, 6vw, 2.6rem);
    font-weight: 700; line-height: 1.2;
    background: linear-gradient(135deg, var(--yellow), var(--orange), var(--pink));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 2px 8px rgba(255,180,0,0.3));
  }
  .game-subtitle {
    font-size: 0.9rem; color: rgba(255,255,255,0.7); margin-top: 6px;
  }

  /* ===== PROGRESS BAR ===== */
  .progress-wrap {
    background: rgba(255,255,255,0.1); border-radius: 100px; height: 10px; overflow: hidden;
  }
  .progress-bar {
    height: 100%; border-radius: 100px;
    background: linear-gradient(90deg, var(--yellow), var(--orange));
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
    box-shadow: 0 0 12px rgba(255,180,0,0.5);
  }
  .progress-label {
    text-align: right; font-size: 0.78rem; color: rgba(255,255,255,0.6); margin-top: 4px;
  }

  /* ===== QUESTION CARD ===== */
  .question-card {
    background: rgba(255,255,255,0.08);
    border: 1.5px solid rgba(255,255,255,0.15);
    border-radius: 24px; padding: 24px 22px;
    backdrop-filter: blur(16px);
  }
  .q-number {
    font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em;
    color: var(--yellow); margin-bottom: 8px; text-transform: uppercase;
  }
  .q-text {
    font-size: clamp(1rem, 3.5vw, 1.2rem); font-weight: 700; line-height: 1.5;
    color: #fff;
  }
  .guardian-name { color: var(--yellow); }

  /* ===== CHOICE BUTTONS ===== */
  .choices { display: flex; flex-direction: column; gap: 10px; }
  .choice-btn {
    background: rgba(255,255,255,0.08);
    border: 1.5px solid rgba(255,255,255,0.18);
    border-radius: 16px; padding: 14px 18px;
    color: #fff; font-size: 0.95rem; font-weight: 500;
    cursor: pointer; text-align: left;
    transition: all 0.22s cubic-bezier(.4,0,.2,1);
    position: relative; overflow: hidden;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .choice-btn::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, var(--yellow), var(--orange));
    opacity: 0; transition: opacity 0.22s;
    border-radius: 16px;
  }
  .choice-btn:hover, .choice-btn:focus {
    border-color: var(--yellow);
    transform: translateX(6px);
    box-shadow: 0 4px 20px rgba(255,180,0,0.2);
  }
  .choice-btn:hover::before { opacity: 0.15; }
  .choice-btn:active { transform: scale(0.97) translateX(6px); }
  .choice-btn.selected {
    border-color: var(--yellow);
    background: linear-gradient(135deg, rgba(255,217,61,0.25), rgba(255,107,53,0.2));
    transform: translateX(6px);
  }
  .choice-btn span { position: relative; z-index: 1; }

  /* ===== TARGET SELECTION ===== */
  .target-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  }
  .target-btn {
    background: rgba(255,255,255,0.08);
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 20px; padding: 20px 12px;
    color: #fff; font-size: 0.95rem; font-weight: 700;
    cursor: pointer; text-align: center;
    transition: all 0.25s cubic-bezier(.4,0,.2,1);
    font-family: 'Noto Sans KR', sans-serif;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .target-btn .emoji { font-size: 2.2rem; }
  .target-btn:hover, .target-btn.selected {
    border-color: var(--yellow);
    background: linear-gradient(135deg, rgba(255,217,61,0.2), rgba(255,107,53,0.15));
    transform: translateY(-4px);
    box-shadow: 0 8px 24px rgba(255,180,0,0.2);
  }
  .target-btn:last-child:nth-child(odd) { grid-column: 1 / -1; }

  .custom-input-wrap { display: none; margin-top: 4px; }
  .custom-input-wrap.show { display: block; animation: fadeSlideUp 0.3s ease; }
  .custom-input {
    width: 100%; padding: 14px 18px;
    background: rgba(255,255,255,0.1);
    border: 1.5px solid rgba(255,255,255,0.25);
    border-radius: 14px; color: #fff; font-size: 1rem;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none; transition: border-color 0.2s;
  }
  .custom-input::placeholder { color: rgba(255,255,255,0.4); }
  .custom-input:focus { border-color: var(--yellow); }

  /* ===== MAIN BUTTON ===== */
  .main-btn {
    padding: 16px 32px; border-radius: 100px;
    background: linear-gradient(135deg, var(--yellow), var(--orange));
    color: var(--navy); font-size: 1.05rem; font-weight: 900;
    border: none; cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.22s cubic-bezier(.4,0,.2,1);
    box-shadow: 0 4px 20px rgba(255,150,0,0.4);
    align-self: center; min-width: 180px;
  }
  .main-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(255,150,0,0.5); }
  .main-btn:active { transform: scale(0.96); }
  .main-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* ===== LOADING ===== */
  .loading-wrap {
    text-align: center; padding: 40px 0;
  }
  .loading-emoji {
    font-size: 3rem; display: block; margin-bottom: 16px;
    animation: spin 1s linear infinite;
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  .loading-text {
    font-size: 1rem; color: rgba(255,255,255,0.8);
    animation: pulse 1s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 0.6; }
    50% { opacity: 1; }
  }

  /* ===== RESULT PAGE ===== */
  .result-header {
    text-align: center; padding: 10px 0;
  }
  .result-type-badge {
    display: inline-block;
    background: linear-gradient(135deg, var(--yellow), var(--orange));
    color: var(--navy); font-weight: 900; font-size: 0.85rem;
    padding: 6px 20px; border-radius: 100px; margin-bottom: 12px;
    letter-spacing: 0.06em;
  }
  .result-type-name {
    font-family: 'Gaegu', cursive;
    font-size: clamp(2rem, 7vw, 2.8rem); font-weight: 700;
    line-height: 1.2;
  }
  .result-type-emoji { font-size: 3.5rem; display: block; margin-bottom: 8px; }

  .result-card {
    background: rgba(255,255,255,0.08);
    border: 1.5px solid rgba(255,255,255,0.15);
    border-radius: 24px; padding: 22px 20px;
    backdrop-filter: blur(16px);
  }
  .result-card-title {
    font-size: 0.78rem; font-weight: 700; letter-spacing: 0.1em;
    color: var(--yellow); margin-bottom: 12px; text-transform: uppercase;
  }
  .result-desc {
    font-size: 0.98rem; line-height: 1.7; color: rgba(255,255,255,0.9);
  }

  .top3-list { display: flex; flex-direction: column; gap: 10px; }
  .top3-item {
    display: flex; align-items: center; gap: 14px;
    background: rgba(255,255,255,0.06);
    border-radius: 14px; padding: 14px 16px;
    animation: slideInLeft 0.4s ease backwards;
  }
  .top3-item:nth-child(2) { animation-delay: 0.1s; }
  .top3-item:nth-child(3) { animation-delay: 0.2s; }
  @keyframes slideInLeft {
    from { opacity: 0; transform: translateX(-20px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .top3-rank { font-size: 1.3rem; flex-shrink: 0; }
  .top3-text { font-size: 0.98rem; font-weight: 700; }

  .mission-box {
    background: linear-gradient(135deg, rgba(255,217,61,0.15), rgba(255,107,53,0.1));
    border: 1.5px solid rgba(255,217,61,0.3);
    border-radius: 20px; padding: 20px;
    text-align: center;
  }
  .mission-emoji { font-size: 2rem; display: block; margin-bottom: 8px; }
  .mission-text { font-size: 1.05rem; font-weight: 700; line-height: 1.5; }

  .heartbot-quote {
    font-family: 'Gaegu', cursive; font-size: 1.1rem; font-weight: 700;
    text-align: center; color: var(--yellow);
    padding: 8px 0;
  }

  .action-guide {
    font-size: 0.92rem; line-height: 1.65; color: rgba(255,255,255,0.85);
    padding: 4px 0;
  }

  .btn-row {
    display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
  }
  .secondary-btn {
    padding: 14px 24px; border-radius: 100px;
    background: rgba(255,255,255,0.1);
    border: 1.5px solid rgba(255,255,255,0.2);
    color: #fff; font-size: 0.95rem; font-weight: 700;
    cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.22s;
    display: flex; align-items: center; gap: 6px;
  }
  .secondary-btn:hover { background: rgba(255,255,255,0.18); transform: translateY(-2px); }
  .secondary-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* ===== SAVE OVERLAY ===== */
  #save-overlay {
    display: none; position: fixed; inset: 0; z-index: 2000;
    background: rgba(0,0,0,0.75); backdrop-filter: blur(6px);
    align-items: center; justify-content: center; flex-direction: column; gap: 16px;
  }
  #save-overlay.show { display: flex; }
  #save-overlay .save-msg {
    color: #fff; font-size: 1rem; font-weight: 700; text-align: center;
    animation: pulse 1s infinite;
  }
  #save-overlay .save-spinner {
    font-size: 2.5rem; animation: spin 1s linear infinite;
  }

  /* ===== CAPTURE CARD (hidden, used only for export) ===== */
  #capture-card {
    position: fixed; left: -9999px; top: 0;
    width: 540px; padding: 36px 32px;
    background: #1A1A2E;
    font-family: 'Noto Sans KR', sans-serif;
    color: #fff;
    border-radius: 28px;
  }

  /* ===== SPARKLES ===== */
  .sparkle {
    position: fixed; pointer-events: none; z-index: 998;
    font-size: 1.4rem;
    animation: sparkleAnim 0.8s ease forwards;
  }
  @keyframes sparkleAnim {
    0% { opacity: 1; transform: scale(0.5) translateY(0); }
    100% { opacity: 0; transform: scale(1.5) translateY(-60px); }
  }

  /* ===== SCROLL ===== */
  .screen { overflow-y: auto; max-height: 92vh; }
  .screen::-webkit-scrollbar { width: 4px; }
  .screen::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

  @media (max-width: 480px) {
    .target-grid { grid-template-columns: 1fr 1fr; }
    .wrapper { padding: 16px 12px; }
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="confetti-container" id="confetti"></div>

<!-- Save overlay -->
<div id="save-overlay">
  <span class="save-spinner">🌺</span>
  <div class="save-msg">이미지 저장 중…<br>잠깐만 기다려줘! 💛</div>
</div>

<!-- Hidden capture card (rendered off-screen for html2canvas) -->
<div id="capture-card"></div>

<div class="wrapper">

  <!-- ===== INTRO SCREEN ===== -->
  <div class="screen active" id="screen-intro">
    <div class="title-wrap">
      <div style="font-size:3rem; margin-bottom:8px;">🌺</div>
      <div class="game-title">퍼스널 효도 테스트</div>
      <div class="game-subtitle">AI가 추천하는 맞춤 효도 가이드 💛</div>
    </div>

    <div class="heartbot">
      <div class="heartbot-face">🤖</div>
      <div class="heartbot-text">
        안녕! 나는 <strong>효도봇</strong>이야 💛<br>
        나를 아껴주는 사람의 <strong>퍼스널 효도</strong>를 함께 찾아보자!<br>
        8개 질문이면 돼, 금방이야 😊
      </div>
    </div>

    <div class="result-card" style="padding:16px 18px;">
      <div style="font-size:0.88rem; color:rgba(255,255,255,0.75); line-height:1.7;">
        🎮 총 8문항 · 약 2~3분<br>
        💡 정답 없음 — 솔직하게 답해줘!<br>
        🌈 다양한 가족 형태 모두 환영
      </div>
    </div>

    <button class="main-btn" onclick="showScreen('screen-target')">
      🚀 효도 테스트 시작!
    </button>
  </div>

  <!-- ===== TARGET SELECTION ===== -->
  <div class="screen" id="screen-target">
    <div class="heartbot">
      <div class="heartbot-face">🤖</div>
      <div class="heartbot-text">
        먼저, 오늘 누구의 <strong>퍼스널 효도</strong>를 찾을 거야? 💛
      </div>
    </div>

    <div class="question-card">
      <div class="q-number">STEP 1</div>
      <div class="q-text">오늘 탐색할 대상을 골라줘!</div>
    </div>

    <div class="target-grid" id="target-grid">
      <button class="target-btn" onclick="selectTarget('엄마', this)">
        <span class="emoji">👩</span><span>엄마</span>
      </button>
      <button class="target-btn" onclick="selectTarget('아빠', this)">
        <span class="emoji">👨</span><span>아빠</span>
      </button>
      <button class="target-btn" onclick="selectTarget('할머니', this)">
        <span class="emoji">👵</span><span>할머니</span>
      </button>
      <button class="target-btn" onclick="selectTarget('할아버지', this)">
        <span class="emoji">👴</span><span>할아버지</span>
      </button>
      <button class="target-btn" onclick="selectTarget('__custom__', this)" id="custom-target-btn">
        <span class="emoji">💛</span><span>그 외 나를<br>아껴주는 사람</span>
      </button>
    </div>

    <div class="custom-input-wrap" id="custom-input-wrap">
      <input type="text" class="custom-input" id="custom-input" placeholder="예: 이모, 삼촌, 고모, 선생님…" maxlength="10" oninput="updateCustomName()">
    </div>

    <button class="main-btn" id="target-next-btn" disabled onclick="startGame()">
      다음으로 →
    </button>
  </div>

  <!-- ===== QUESTION SCREEN ===== -->
  <div class="screen" id="screen-question">
    <div class="progress-wrap">
      <div class="progress-bar" id="progress-bar" style="width:0%"></div>
    </div>
    <div class="progress-label" id="progress-label">1 / 8</div>

    <div class="heartbot" id="q-heartbot">
      <div class="heartbot-face">🤖</div>
      <div class="heartbot-text" id="q-heartbot-text">좋아! 퍼스널 효도를 찾아보자 💛</div>
    </div>

    <div class="question-card" id="question-card">
      <div class="q-number" id="q-number">Q1</div>
      <div class="q-text" id="q-text"></div>
    </div>

    <div class="choices" id="choices"></div>
  </div>

  <!-- ===== LOADING SCREEN ===== -->
  <div class="screen" id="screen-loading">
    <div class="loading-wrap">
      <span class="loading-emoji">🌺</span>
      <div class="loading-text" id="loading-text">분석 중…</div>
    </div>
  </div>

  <!-- ===== RESULT SCREEN ===== -->
  <div class="screen" id="screen-result">
    <!-- dynamically filled -->
  </div>

</div>

<script>
// ============================================================
// STARS
// ============================================================
(function createStars() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 3 + 1;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      top:${Math.random()*100}%; left:${Math.random()*100}%;
      --dur:${Math.random()*3+2}s;
      animation-delay:${Math.random()*4}s;
    `;
    container.appendChild(s);
  }
})();

// ============================================================
// STATE
// ============================================================
let selectedGuardian = '';
let currentQ = 0;
let scores = { 감성: 0, 실용: 0, 도움: 0, 리액션: 0, 함께: 0 };
let currentResultType = null;

// ============================================================
// QUESTIONS
// ============================================================
const questions = [
  {
    text: (g) => `${g}가 가장 자주 하는 말은?`,
    heartbot: (g) => `${g}의 말버릇... 혹시 떠오르는 거 있어? 😄`,
    choices: [
      { text: '🍚 "밥 먹었어?"', scores: { 도움: 2 } },
      { text: '😊 "조심히 다녀와~"', scores: { 감성: 2 } },
      { text: '😮‍💨 "아이고 피곤해…"', scores: { 도움: 1, 함께: 1 } },
      { text: '🤗 "괜찮아 괜찮아"', scores: { 감성: 2, 리액션: 1 } },
      { text: '📚 "공부는 했니?"', scores: { 실용: 2 } },
    ]
  },
  {
    text: (g) => `${g}가 쉬는 날 가장 좋아하는 건?`,
    heartbot: () => `쉬는 날 모습이 제일 진짜야 🛋️`,
    choices: [
      { text: '🛋️ 누워있기', scores: { 도움: 2 } },
      { text: '🚶 산책가기', scores: { 함께: 2 } },
      { text: '🧹 청소하기', scores: { 실용: 2, 도움: 1 } },
      { text: '🍜 맛있는 거 먹기', scores: { 실용: 1, 함께: 1 } },
      { text: '📺 TV 보기', scores: { 함께: 1, 리액션: 1 } },
    ]
  },
  {
    text: (g) => `칭찬하면 ${g}의 반응은?`,
    heartbot: () => `이 질문 답하면서 웃음 터진 사람 손 🙋`,
    choices: [

// ============================================================
// SCREEN MANAGEMENT
// ============================================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById(id);
  el.classList.add('active');
  el.scrollTop = 0;
}

// ============================================================
// TARGET SELECTION
// ============================================================
function selectTarget(name, btn) {
  document.querySelectorAll('.target-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  const customWrap = document.getElementById('custom-input-wrap');
  const nextBtn = document.getElementById('target-next-btn');

  if (name === '__custom__') {
    customWrap.classList.add('show');
    document.getElementById('custom-input').focus();
    const val = document.getElementById('custom-input').value.trim();
    selectedGuardian = val || '';
    nextBtn.disabled = !val;
  } else {
    customWrap.classList.remove('show');
    selectedGuardian = name;
    nextBtn.disabled = false;
  }
  spawnSparkle();
}

function updateCustomName() {
  const val = document.getElementById('custom-input').value.trim();
  selectedGuardian = val;
  document.getElementById('target-next-btn').disabled = !val;
}

// ============================================================
// GAME START
// ============================================================
function startGame() {
  currentQ = 0;
  scores = { 감성: 0, 실용: 0, 도움: 0, 리액션: 0, 함께: 0 };
  showScreen('screen-question');
  renderQuestion();
}

// ============================================================
// RENDER QUESTION
// ============================================================
function renderQuestion() {
  const q = questions[currentQ];
  const total = questions.length;

  document.getElementById('progress-bar').style.width = `${(currentQ / total) * 100}%`;
  document.getElementById('progress-label').textContent = `${currentQ + 1} / ${total}`;
  document.getElementById('q-number').textContent = `Q${currentQ + 1}`;
  document.getElementById('q-heartbot-text').textContent = q.heartbot(selectedGuardian);

  const qText = document.getElementById('q-text');
  const raw = q.text(selectedGuardian);
  qText.innerHTML = raw.replace(
    selectedGuardian,
    `<span class="guardian-name">${selectedGuardian}</span>`
  );

  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  q.choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span>${c.text}</span>`;
    btn.addEventListener('click', () => selectChoice(c.scores, btn));
    btn.style.animation = `fadeSlideUp 0.4s ease ${i * 0.06}s backwards`;
    choicesEl.appendChild(btn);
  });
}

function selectChoice(addScores, btn) {
  document.querySelectorAll('.choice-btn').forEach(b => { b.disabled = true; });
  btn.classList.add('selected');
  spawnSparkle();
  Object.entries(addScores).forEach(([key, val]) => { scores[key] += val; });
  setTimeout(() => {
    currentQ++;
    if (currentQ >= questions.length) {
      showLoading();
    } else {
      renderQuestion();
    }
  }, 420);
}

  showScreen('screen-loading');

    i++;
    if (i >= loadingMessages.length) {

      setTimeout(showResult, 600);
    }
  }, 500);
}

async function saveResultImage() {
  const btn = document.getElementById('save-btn');
  if (!btn || !currentResultType) return;

  btn.disabled = true;

  // Show overlay
  const overlay = document.getElementById('save-overlay');
  overlay.classList.add('show');

  try {
    // Build the off-screen card
    buildCaptureCard(currentResultType);
    const card = document.getElementById('capture-card');

    // Wait a tick for fonts/layout
    await new Promise(r => setTimeout(r, 300));

    const canvas = await html2canvas(card, {
      backgroundColor: null,
      scale: 2,
      useCORS: true,
      allowTaint: true,
      logging: false,
    });

    // Download
    const link = document.createElement('a');
    link.download = `효도테스트_${selectedGuardian}_${currentResultType.name}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();

  } catch (e) {
    alert('이미지 저장에 실패했어요 😢\n브라우저가 이미지 저장을 지원하지 않는 경우가 있어요.');
  } finally {
    overlay.classList.remove('show');
    btn.disabled = false;
  }
}

// ============================================================
// CONFETTI
// ============================================================
function launchConfetti() {
  const container = document.getElementById('confetti');
  container.innerHTML = '';
  const colors = ['#FFD93D','#FF6B35','#FF8FA3','#C77DFF','#52E3C2','#fff'];
  for (let i = 0; i < 80; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    const color = colors[Math.floor(Math.random() * colors.length)];
    const left = Math.random() * 100;
    const dur = Math.random() * 2 + 1.5;
    const delay = Math.random() * 1.5;
    const size = Math.random() * 10 + 6;
    piece.style.cssText = `
      left:${left}%; --fall-dur:${dur}s;
      animation-delay:${delay}s;
      background:${color};
      width:${size}px; height:${size}px;
      border-radius:${Math.random() > 0.5 ? '50%' : '2px'};
    `;
    container.appendChild(piece);
  }
  setTimeout(() => { container.innerHTML = ''; }, 4000);
}

// ============================================================
// SPARKLE
// ============================================================
function spawnSparkle() {
  const emojis = ['✨','⭐','💛','🌟','💫','🌺'];
  for (let i = 0; i < 3; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'sparkle';
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.left = `${Math.random() * 80 + 10}%`;
      el.style.top = `${Math.random() * 60 + 20}%`;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 800);
    }, i * 100);
  }
}

// ============================================================
// RESTART
// ============================================================
function restartGame() {
  document.body.style.background = '';
  selectedGuardian = '';
  currentQ = 0;
  currentResultType = null;
  scores = { 감성: 0, 실용: 0, 도움: 0, 리액션: 0, 함께: 0 };
  document.querySelectorAll('.target-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('custom-input-wrap').classList.remove('show');
  document.getElementById('custom-input').value = '';
  document.getElementById('target-next-btn').disabled = true;
  showScreen('screen-intro');
}
</script>
